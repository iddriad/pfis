<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>PFIS — Transactions</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-title">🛡 PFIS</div>
    <div class="brand-sub">Predictive Fraud Intelligence</div>
  </div>
  <div class="sidebar-nav">
    <a href="/"               class="sidebar-link "><span class="icon">📊</span> Dashboard</a>
    <a href="/monitor"        class="sidebar-link "><span class="icon">📡</span> Live Monitor</a>
    <a href="/transactions"   class="sidebar-link active"><span class="icon">📋</span> Transactions</a>
    <a href="/profiles"       class="sidebar-link "><span class="icon">👤</span> User Profiles</a>
    <a href="/investigations" class="sidebar-link "><span class="icon">🔍</span> Investigations</a>
    <a href="/reports"        class="sidebar-link "><span class="icon">📈</span> Reports</a>
    <a href="/settings"       class="sidebar-link "><span class="icon">⚙</span> Settings</a>
  </div>
  <div class="engine-bar">
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Engine Offline</span>
    </div>
    <button class="btn btn-primary btn-sm" id="engineBtn" onclick="toggleEngine()" style="width:100%;">▶ Activate Engine</button>
  </div>
</nav>
<div class="main">
  <div class="topbar">
    <div class="topbar-title">Transactions</div>
    <div id="dashTime" style="font-size:12px;color:var(--gov-muted);text-align:right;"></div>
  </div>
  <div class="page-content">

<div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
  <select id="txnRiskFilter" onchange="renderTxnTable()">
    <option value="all">All Risk Levels</option>
    <option value="safe">Safe</option>
    <option value="moderate">Moderate</option>
    <option value="high">High Risk</option>
  </select>
  <select id="txnStatusFilter" onchange="renderTxnTable()">
    <option value="all">All Statuses</option>
    <option value="approved">Approved</option>
    <option value="monitoring">Monitoring</option>
    <option value="blocked">Blocked</option>
    <option value="cancelled">Cancelled</option>
    <option value="investigating">Investigating</option>
  </select>
  <span class="text-muted text-small" id="txnCount"></span>
  <button class="btn btn-outline btn-sm" style="margin-left:auto;" onclick="exportCSV()">⬇ Export CSV</button>
</div>
<div class="card">
  <div class="table-wrap">
    <table class="gov-table">
      <thead><tr>
        <th>Ref No</th><th>Date/Time</th><th>Customer</th><th>Type</th>
        <th>Amount</th><th>Recipient</th><th>Device</th><th>Location</th>
        <th>Score</th><th>Risk</th><th>Status</th><th>Action</th>
      </tr></thead>
      <tbody id="txnBody">
        <tr><td colspan="12" style="text-align:center;color:var(--gov-muted);padding:40px;">No transactions recorded yet.</td></tr>
      </tbody>
    </table>
  </div>
</div>

  </div>
</div>
<script src="/pfis.js"></script>
</body>
</html>
